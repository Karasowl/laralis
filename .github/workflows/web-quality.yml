name: Dental QA

on:
  pull_request:
    paths:
      - 'apps/dental/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/web-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/dental/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/web-quality.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dental
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dental/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: QA check
        run: npm run qa:check
